<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autos</title>
    <link rel="stylesheet" href="../CSS/Autos.css">
    <link rel="icon" href="../imgs/car.png">
</head>
<body>
    <header>
        <div class="encabezado">Concesionaria Cortes</div>
        <nav class="nav-bar">
            <ul>
                <li class="borde"><a href="Inicio.html"><img src="../imgs/house.png" alt="" class="icono-nav-bar">Inicio</a></li>
                <li class="borde"><a href="Autos.html" class="seleccionado"><img src="../imgs/car.png" alt="" class="icono-nav-bar">Autos</a></li>
                <li class="borde"><a href="Motos.html"><img src="../imgs/motorcycle.png" alt="" class="icono-nav-bar">Motos</a></li>
                <li class="borde"><a href="Camiones.html"><img src="../imgs/truck.png" alt="" class="icono-nav-bar">Camiones</a></li>
                <li class="borde"><a href="Sucursales.html"><img src="../imgs/shop.png" alt="" class="icono-nav-bar">Sucursales</a></li>
                <li class="borde"><a href="Servicios.html"><img src="../imgs/screwdriver-wrench.png" alt="" class="icono-nav-bar">Servicios</a></li>
                <li><a href="Contacto.html"><img src="../imgs/phone.png" alt="" class="icono-nav-bar">Contacto</a></li>
            </ul>
        </nav>
    </header>
    <main class="cont-inferior">
        <section id="seccion-filtrado">
            <h1>Autos disponibles</h1>
            <img class="btn-filtrado" src="../imgs/filter.png" alt="" onclick="abrirMenuFiltro()">
            <div id="menu-filtrado" class="menu-oculto">
                <p>Marca</p>
                <div class="select-filtro">
                    <select id="marca">
                        <option value="">Seleccione una marca</option>
                    </select>
                </div>
                <p>Año</p>
                <div class="select-filtro">
                    <select id="anio">
                        <option value="">Seleccione un año</option>
                    </select>
                </div>
                <p>Color</p>
                <div class="select-filtro">
                    <select id="color">
                        <option value="">Seleccione un color</option>
                    </select>
                </div>
                <p>Rango de precios</p>
                <div class="rango-precios">
                    <input type="number" id="precio-minimo" placeholder="Minimo" min="0"> 
                    -
                    <input type="number" id="precio-maximo" placeholder="Maximo" min="0">
                </div>
                <p>No. puertas</p>
                <div class="select-filtro">
                    <select id="puertas">
                        <option value="">Seleccione un No. de puertas</option>
                    </select>
                </div>
                <div class="btns-filtro">
                    <button class="btn-aplicar-filtro" onclick="cargarTablaFiltrada()">Aplicar filtros</button>
                    <button class="btn-limpiar-filtro" onclick="limpiarFiltros()">Limpiar filtros</button>
                </div>
                
            </div>
        </section>
        <section class="seccion-autos">
            <table id="tabla"></table>
        </section>
    </main>
    <footer class="pie-pagina">
        <p>Concesionaria Cortes © 2026</p>
    </footer>
    <script src="../JavaScript/Imagenes.js"></script>
    <script src="../JavaScript/Autos.js"></script>
</body>
</html>
