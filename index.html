<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./CSS/index.css">
    <link rel="icon" href="./imgs/usuarioIcono.png">
</head>
<body>
    <header>
        <div class="encabezado">
            Concesionaria Cortes
        </div>
    </header>
    <div class="cont-login">
        <img class="imagen-fondo" src="./imgs/fondo-login.png" alt="autos en una carretera">
        <div class="cont-formulario">
            <div class="formulario-login" >
                <img src="./imgs/usuarioIcono.png" alt="IconoUsuario" class="icono-usuario">
                <div class="entrada">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario">
                </div>
                <div class="entrada">
                    <label for="contrasena">Contraseña</label>
                    <input type="password" id="contrasena">
                </div>
                <p id="error"></p>
                <button class="btn-login" onclick="Validar()">Iniciar sesion</button>
            </div>
        </div>
    </div>
    <footer class="pie-pagina">
        <p>Concesionaria Cortes © 2026</p>
    </footer>
    <script src="./JavaScript/index.js"></script>
</body>
</html>
